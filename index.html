<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <div class="left">Kanban</div>
            <div class="right"><button id="addnewtask">Add new task</button></div>
        </nav>

        <section class="board">
            <div id="todo" class="task-column">
                <div class="heading">
                    <div class="left">To do</div>
                    <div class="right">Count</div>
                </div>

                <div draggable="true" class="task">
                    <h2>Task 1</h2>
                    <p>Task description </p>
                    <button id="deletebtn">Delete</button>
                </div>
            </div>

            <div id="progress" class="task-column">
                <div class="heading">
                    <div class="left">In progress</div>
                    <div class="right">Count</div>
            </div>
            </div>

            <div id="done" class="task-column">
                <div class="heading">
                    <div class="left">Done</div>
                    <div class="right">Count</div>
            </div>
            </div>
        </section>
    </main>


    <div class="addtask">

        <div class="center">
            <input type="text" name="" id="" placeholder="Task Title">
            <textarea name="" id="" placeholder="Task description"></textarea>
            <button id="addtask">Add Task</button>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
